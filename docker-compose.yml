version: "3.9"

services:

  # ─── Bot (Webhook mode) ─────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: v2ray_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # دیتابیس SQLite داخل این پوشه
    networks:
      - botnet
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx (SSL Termination) ─────────────────
  nginx:
    image: nginx:alpine
    container_name: v2ray_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # سرتیفیکیت SSL
    networks:
      - botnet

networks:
  botnet:
    driver: bridge
